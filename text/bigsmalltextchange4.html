<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>온라인 공백제거기 | 텍스트 가공 툴</title>
    <meta name="description" content="불필요한 띄어쓰기나 원치 않는 줄바꿈을 원클릭으로 정돈하는 공백 제거 사이트입니다.">
    <meta name="keywords" content="공백제거, 공백제거사이트, 텍스트공백제거, 줄바꿈제거">
    <style>
        body { 
            font-family: 'Pretendard', -apple-system, sans-serif; 
            background-color: #f0f4f8; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh;
            margin: 0;
            justify-content: center;
        }
        .nav { display: flex; gap: 4px; margin-bottom: 20px; justify-content: center; width: 100%; max-width: 700px; }
        .nav a { flex: 1; text-align: center; padding: 10px 4px; background: #e2e8f0; color: #475569; text-decoration: none; border-radius: 8px; font-size: 13px; font-weight: 700; transition: all 0.2s; white-space: nowrap; }
        .nav a:hover { background: #cbd5e1; }
        .nav a.active { background: #10b981; color: white; }
        
        .container { 
            background: white; padding: 30px; border-radius: 20px; box-shadow: 0 12px 30px rgba(0,0,0,0.08); 
            width: 100%; max-width: 700px; box-sizing: border-box;
        }
        h2 { color: #0f172a; font-size: 22px; margin: 0 0 6px 0; font-weight: 800; text-align: center; }
        .sub-desc { color: #64748b; font-size: 13px; text-align: center; margin: 0 0 20px 0; }
        textarea { 
            width: 100%; height: 200px; padding: 15px; border: 1px solid #cbd5e1; border-radius: 12px;
            font-size: 15px; box-sizing: border-box; outline: none; resize: vertical; background: #f8fafc; line-height: 1.6;
        }
        textarea:focus { border-color: #10b981; background: white; box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1); }
        .tool-toolbar { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top: 15px; }
        .btn-action { padding: 12px; color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer; transition: background 0.2s; }
        .btn-main { background: #10b981; } .btn-main:hover { background: #059669; }
        .btn-sub { background: #3b82f6; } .btn-sub:hover { background: #2563eb; }
        .btn-full { grid-column: span 2; background: #64748b; } .btn-full:hover { background: #475569; }
        
        @media (max-width: 600px) { .nav { gap: 2px; } .nav a { font-size: 11px; padding: 8px 2px; } }
    </style>
</head>
<body>

    <div class="nav">
        <a href="index.html" style="background: #0f172a; color: white;">🏠 홈</a>
        <a href="bigsmalltextchange1.html">📝 글자수</a>
        <a href="bigsmalltextchange2.html">🔠 대소문자</a>
        <a href="bigsmalltextchange3.html">✨ 맞춤법</a>
        <a href="bigsmalltextchange4.html" class="active">🚫 공백제거</a>
        
    </div>

    <div class="container">
        <h2>🚫 온라인 텍스트 공백제거기</h2>
        <p class="sub-desc">불필요한 띄어쓰기나 원치 않는 줄바꿈을 원클릭으로 정돈하세요.</p>
        
        <textarea id="textInput" placeholder="가공할 텍스트를 입력하거나 붙여넣으세요..."></textarea>
        
        <div class="tool-toolbar">
            <button class="btn-action btn-main" onclick="removeSpaces()">🚫 모든 공백 제거</button>
            <button class="btn-action btn-sub" onclick="convertLines()">↩️ 줄바꿈을 한 칸 공백으로</button>
            <button class="btn-action btn-full" onclick="copyText()">📋 가공된 결과 전체 복사</button>
        </div>
    </div>

    <script>
        function removeSpaces() {
            const textarea = document.getElementById('textInput');
            if(!textarea.value) { alert("📌 가공할 텍스트를 먼저 입력해 주세요!"); return; }
            textarea.value = textarea.value.replace(/\s/g, "");
        }
        function convertLines() {
            const textarea = document.getElementById('textInput');
            if(!textarea.value) { alert("📌 가공할 텍스트를 먼저 입력해 주세요!"); return; }
            textarea.value = textarea.value.replace(/\n/g, " ");
        }
        function copyText() {
            const textarea = document.getElementById('textInput');
            if(!textarea.value) { alert("📌 복사할 내용이 없습니다!"); return; }
            textarea.select(); document.execCommand('copy');
            alert("📋 가공 완료된 텍스트가 클립보드에 복사되었습니다!");
        }
    </script>
</body>
</html>
