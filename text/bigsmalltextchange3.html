<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>온라인 맞춤법 검사기 연동 툴</title>
    <meta name="description" content="텍스트를 원클릭으로 복사하여 정밀한 한국어 맞춤법 및 띄어쓰기 검사를 이용해 보세요.">
    <meta name="keywords" content="맞춤법검사기, 한국어맞춤법검사기, 띄어쓰기검사기">
    <style>
        body { 
            font-family: 'Pretendard', -apple-system, sans-serif; 
            background-color: #f0f4f8; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh;
            margin: 0;
            justify-content: center;
        }
        .nav { display: flex; gap: 4px; margin-bottom: 20px; justify-content: center; width: 100%; max-width: 700px; }
        .nav a { flex: 1; text-align: center; padding: 10px 4px; background: #e2e8f0; color: #475569; text-decoration: none; border-radius: 8px; font-size: 13px; font-weight: 700; transition: all 0.2s; white-space: nowrap; }
        .nav a:hover { background: #cbd5e1; }
        .nav a.active { background: #9b59b6; color: white; }
        
        .container { 
            background: white; padding: 30px; border-radius: 20px; box-shadow: 0 12px 30px rgba(0,0,0,0.08); 
            width: 100%; max-width: 700px; box-sizing: border-box;
        }
        h2 { color: #0f172a; font-size: 22px; margin: 0 0 6px 0; font-weight: 800; text-align: center; }
        .sub-desc { color: #64748b; font-size: 13px; text-align: center; margin: 0 0 20px 0; }
        textarea { 
            width: 100%; height: 200px; padding: 15px; border: 1px solid #cbd5e1; border-radius: 12px;
            font-size: 15px; box-sizing: border-box; outline: none; resize: vertical; background: #f8fafc; line-height: 1.6;
        }
        textarea:focus { border-color: #9b59b6; background: white; box-shadow: 0 0 0 3px rgba(155, 89, 182, 0.1); }
        .check-btn { width: 100%; padding: 13px; background: #9b59b6; color: white; font-weight: 700; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; transition: background 0.2s; margin-top: 5px; }
        .check-btn:hover { background: #8e44ad; }
        
        @media (max-width: 600px) { .nav { gap: 2px; } .nav a { font-size: 11px; padding: 8px 2px; } }
    </style>
</head>
<body>

    <div class="nav">
        <a href="index.html" style="background: #0f172a; color: white;">🏠 홈</a>
        <a href="bigsmalltextchange1.html">📝 글자수</a>
        <a href="bigsmalltextchange2.html">🔠 대소문자</a>
        <a href="bigsmalltextchange3.html" class="active">✨ 맞춤법</a>
        <a href="bigsmalltextchange4.html">🚫 공백제거</a>
    </div>

    <div class="container">
        <h2>✨ 온라인 맞춤법 검사기</h2>
        <p class="sub-desc">작성하신 글을 복사하여 한국어 맞춤법 서포터로 이동합니다.</p>
        
        <textarea id="textInput" placeholder="검사할 내용을 입력하거나 붙여넣으세요..."></textarea>
        <button class="check-btn" onclick="check()">🚀 맞춤법 검사하러 가기</button>
    </div>

    <script>
        function check() {
            const text = document.getElementById('textInput').value;
            if(!text) { alert('📌 검사할 텍스트를 먼저 입력해 주세요!'); return; }
            navigator.clipboard.writeText(text).then(() => {
                alert('📋 글이 클립보드에 복사되었습니다!\n새 창이 열리면 [Ctrl + V]로 붙여넣어 검사하세요.');
                window.open('https://nara-speller.co.kr/', '_blank');
            }).catch(err => { window.open('https://nara-speller.co.kr/', '_blank'); });
        }
    </script>
</body>
</html>
