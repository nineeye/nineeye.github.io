<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>온라인 실시간 글자수세기 & 바이트 계산기</title>
    <meta name="description" content="실시간 글자수 계산 및 사람인, 잡코리아 기준 맞춤형 바이트(Byte) 수치까지 완벽하게 지원하는 정교한 글자수세기 도구입니다.">
    <meta name="keywords" content="글자수세기, 바이트계산기, 자소서글자수, 사람인글자수, 잡코리아글자수">
    <style>
        body { 
            font-family: 'Pretendard', -apple-system, sans-serif; 
            background-color: #f0f4f8; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh;
            margin: 0;
            justify-content: center;
        }
        /* 📱 6개 메뉴가 무조건 한 줄에 이쁘게 나오도록 반응형 탭 최적화 */
        .nav { 
            display: flex; 
            gap: 4px; 
            margin-bottom: 20px; 
            justify-content: center; 
            width: 100%;
            max-width: 700px;
        }
        .nav a { 
            flex: 1;
            text-align: center;
            padding: 10px 4px; 
            background: #e2e8f0; 
            color: #475569;
            text-decoration: none; 
            border-radius: 8px; 
            font-size: 13px;
            font-weight: 700;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .nav a:hover { background: #cbd5e1; }
        .nav a.active { 
            background: #3b82f6; 
            color: white; 
        }
        
        .container { 
            background: white; 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 12px 30px rgba(0,0,0,0.08); 
            width: 100%; 
            max-width: 700px; 
            box-sizing: border-box;
        }
        h2 { color: #0f172a; font-size: 22px; margin: 0 0 6px 0; font-weight: 800; text-align: center; }
        .sub-desc { color: #64748b; font-size: 13px; text-align: center; margin: 0 0 20px 0; }
        textarea { 
            width: 100%; height: 180px; padding: 15px; border: 1px solid #cbd5e1; border-radius: 12px;
            font-size: 15px; box-sizing: border-box; outline: none; resize: vertical; background: #f8fafc; line-height: 1.6;
        }
        textarea:focus { border-color: #3b82f6; background: white; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }
        .section-title { font-size: 13px; font-weight: 700; color: #475569; margin: 20px 0 8px 2px; }
        .count-board { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .count-box { background: #f1f5f9; padding: 12px; border-radius: 10px; text-align: center; border: 1px solid #e2e8f0; }
        .count-box .label { font-size: 12px; color: #64748b; font-weight: 600; margin-bottom: 4px; }
        .count-box .number { font-size: 20px; font-weight: 800; color: #0f172a; }
        .byte-board { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .byte-box { background: #fef3c7; padding: 14px; border-radius: 10px; text-align: center; border: 1px solid #fde68a; }
        .byte-box.saramin { background: #eff6ff; border-color: #bfdbfe; }
        .byte-box.jobkorea { background: #f5f3ff; border-color: #ddd6fe; }
        .byte-box .label { font-size: 12px; font-weight: 700; margin-bottom: 4px; }
        .byte-box.saramin .label { color: #1e40af; }
        .byte-box.jobkorea .label { color: #5b21b6; }
        .byte-box .number { font-size: 22px; font-weight: 800; }
        .byte-box.saramin .number { color: #1d4ed8; }
        .byte-box.jobkorea .number { color: #6d28d9; }
        
        @media (max-width: 600px) {
            .nav { gap: 2px; }
            .nav a { font-size: 11px; padding: 8px 2px; }
        }
    </style>
</head>
<body>

    <div class="nav">
        <a href="index.html" style="background: #0f172a; color: white;">🏠 홈</a>
        <a href="bigsmalltextchange1.html" class="active">📝 글자수</a>
        <a href="bigsmalltextchange2.html">🔠 대소문자</a>
        <a href="bigsmalltextchange3.html">✨ 맞춤법</a>
        <a href="bigsmalltextchange4.html">🚫 공백제거</a>
        
    </div>

    <div class="container">
        <h2>📝 정교한 실시간 글자수세기</h2>
        <p class="sub-desc">공백 분석은 물론 취업 플랫폼별 맞춤형 바이트(Byte)까지 정밀 계산합니다.</p>
        
        <textarea id="textInput" placeholder="여기에 내용을 입력하거나 붙여넣으세요..." oninput="counter()"></textarea>
        
        <div class="section-title">📊 기본 글자수 측정</div>
        <div class="count-board">
            <div class="count-box">
                <div class="label">공백 포함 (글자수)</div>
                <div id="withSpace" class="number">0</div>
            </div>
            <div class="count-box">
                <div class="label">공백 제외 (글자수)</div>
                <div id="withoutSpace" class="number">0</div>
            </div>
        </div>

        <div class="section-title">💼 취업 플랫폼별 실시간 자소서 바이트(Byte) 표준</div>
        <div class="byte-board">
            <div class="byte-box saramin">
                <div class="label">사람인 기준 (한글 2B / 영문 1B / 엔터 2B)</div>
                <div id="saraminByte" class="number">0 <span style="font-size:13px; font-weight:500;">Byte</span></div>
            </div>
            <div class="byte-box jobkorea">
                <div class="label">잡코리아 기준 (한글 3B / 영문 1B / 엔터 1B)</div>
                <div id="jobkoreaByte" class="number">0 <span style="font-size:13px; font-weight:500;">Byte</span></div>
            </div>
        </div>
    </div>

    <script>
        function counter() {
            const text = document.getElementById('textInput').value;
            const withSpaceCount = text.length;
            const withoutSpaceCount = text.replace(/\s/g, "").length;
            document.getElementById('withSpace').innerText = withSpaceCount;
            document.getElementById('withoutSpace').innerText = withoutSpaceCount;

            let saraminByte = 0, jobkoreaByte = 0;
            for (let i = 0; i < text.length; i++) {
                const char = text.charCodeAt(i);
                const character = text.charAt(i);
                if (character === '\n') { saraminByte += 2; } 
                else if (char > 127) { saraminByte += 2; } 
                else { saraminByte += 1; }

                if (character === '\n') { jobkoreaByte += 1; } 
                else if (char > 127) { jobkoreaByte += 3; } 
                else { jobkoreaByte += 1; }
            }
            document.getElementById('saraminByte').innerHTML = saraminByte + ' <span style="font-size:13px; font-weight:500;">Byte</span>';
            document.getElementById('jobkoreaByte').innerHTML = jobkoreaByte + ' <span style="font-size:13px; font-weight:500;">Byte</span>';
        }
    </script>
</body>
</html>
