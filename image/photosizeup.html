<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 초고화질 이미지 확대기</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: -apple-system, system-ui, sans-serif; background-color: #f4f7f6; padding: 40px 20px; display: flex; justify-content: center; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 100%; max-width: 600px; }
        h2 { margin-top: 0; color: #2c3e50; text-align: center; margin-bottom: 25px; }
        .warning-box { background-color: #e3f2fd; color: #0d47a1; padding: 15px; border-radius: 8px; border-left: 5px solid #2196f3; font-size: 14px; line-height: 1.5; margin-bottom: 20px; }
        .upload-box { border: 2px dashed #3498db; padding: 40px 30px; text-align: center; border-radius: 8px; background-color: #ebf5fb; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; margin-bottom: 20px; }
        .upload-box input { display: none; }
        .upload-label { font-size: 16px; font-weight: bold; color: #2980b9; }
        
        /* 배율 선택 박스 스타일링 */
        .scale-config { background: #f8f9fa; padding: 15px; border-radius: 8px; font-size: 14px; margin-bottom: 20px; border: 1px solid #e9ecef; }
        .scale-config label { font-weight: bold; color: #2c3e50; display: block; margin-bottom: 8px; }
        .scale-config select { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #ced4da; font-size: 15px; background-color: white; cursor: pointer; }
        
        .preview-container { display: none; text-align: center; margin-bottom: 20px; }
        .preview-container img { max-width: 100%; height: auto; border-radius: 6px; border: 1px solid #ccc; margin-top: 10px; }
        .btn-download { width: 100%; padding: 15px; background-color: #95a5a6; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: not-allowed; transition: background 0.2s; }
        .btn-download.active { background-color: #2ecc71; cursor: pointer; }
        .loading { background-color: #e67e22 !important; cursor: wait !important; }
    </style>
</head>
<body>

    <div class="container">
        <h2>🤖 AI 고화질 이미지 확대기</h2>
        
        <div class="warning-box">
            <strong>✨ 24시간 언제나 무료 고화질 변환 서비스</strong><br>
            초고성능 딥러닝 AI 신경망(Real-ESRGAN)이 깨진 픽셀을 정밀 분석하여 선택하신 배율로 선명하게 복원합니다.
        </div>

        <div class="scale-config">
            <label for="scaleSelect">🔍 AI 확대 배율 선택</label>
            <select id="scaleSelect">
                <option value="2">2배 AI 확대 (200%)</option>
                <option value="3">3배 AI 확대 (300%)</option>
                <option value="4" selected>4배 AI 확대 (400%) - 추천</option>
                <option value="6">🔥 6배 AI 초고화질 확대 (600%)</option>
            </select>
        </div>

        <label class="upload-box" id="dropZone">
            <span class="upload-label">📸 클릭하여 이미지 선택</span>
            <input type="file" id="imageInput" accept="image/*">
        </label>

        <div class="preview-container" id="previewArea">
            <label style="font-weight: bold; color: #2c3e50;">원본 이미지 미리보기</label><br>
            <img id="previewImg" src="">
            <div id="infoText" style="margin-top: 15px; font-size: 14px; color: #555;"></div>
        </div>

        <button class="btn-download" id="downloadBtn" disabled>이미지를 먼저 등록해주세요</button>
    </div>

    <script>
        const SERVER_URL = 'https://youssang-photosizeup.hf.space/upscale';

        const imageInput = document.getElementById('imageInput');
        const scaleSelect = document.getElementById('scaleSelect');
        const previewArea = document.getElementById('previewArea');
        const previewImg = document.getElementById('previewImg');
        const downloadBtn = document.getElementById('downloadBtn');
        const infoText = document.getElementById('infoText');

        let base64Image = "";
        let originalFileName = "";
        let origWidth = 0;
        let origHeight = 0;

        function updatePixelInfo() {
            if (!base64Image || origWidth === 0) return;
            const currentScale = parseInt(scaleSelect.value);
            infoText.innerHTML = `원본: ${origWidth}x${origHeight}px ➡️ <strong>AI ${currentScale}배 정밀 복원: ${origWidth * currentScale}x${origHeight * currentScale}px</strong>`;
        }

        scaleSelect.addEventListener('change', updatePixelInfo);

        imageInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            originalFileName = file.name.split('.')[0];
            const reader = new FileReader();
            reader.onload = function(event) {
                base64Image = event.target.result;
                previewImg.src = base64Image;
                previewArea.style.display = 'block';
                
                const img = new Image();
                img.onload = function() {
                    origWidth = img.width;
                    origHeight = img.height;
                    updatePixelInfo();
                };
                img.src = base64Image;

                downloadBtn.disabled = false;
                downloadBtn.classList.add('active');
                downloadBtn.innerText = '🔥 AI 고화질 복원 및 다운로드 시작';
            };
            reader.readAsDataURL(file);
        });

        downloadBtn.addEventListener('click', async function() {
            const selectedScale = scaleSelect.value;
            try {
                downloadBtn.classList.add('loading');
                downloadBtn.innerText = `⚡ AI 인공지능이 ${selectedScale}배 복원 중... (약 10~20초 소요)`;
                downloadBtn.disabled = true;

                const response = await fetch(SERVER_URL, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({ 
                        image: base64Image,
                        scale: selectedScale 
                    })
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`서버 응답 에러 (${response.status}): ${errorText}`);
                }

                const result = await response.json();

                if (result.success && result.image) {
                    const link = document.createElement('a');
                    link.download = `${originalFileName}_AI_${selectedScale}x.png`;
                    link.href = result.image;
                    link.click();
                } else {
                    alert("서버 내부 연산 오류: " + (result.error || "알 수 없는 응답 형식"));
                }

            } catch (error) {
                console.error(error);
                alert(`통신 오류 발생!\n상세원인: ${error.message}\n\n서버가 혼잡하거나 용량이 초과되었을 수 있습니다. 잠시 후 다시 시도해 주세요.`);
            } finally {
                downloadBtn.classList.remove('loading');
                downloadBtn.disabled = false;
                downloadBtn.innerText = '🔥 AI 고화질 복원 및 다운로드 시작';
            }
        });
    </script>
</body>
</html>
