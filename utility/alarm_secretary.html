<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>초 단위 알람 시계 알림 타이머</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; text-align: center; padding: 40px; background: #f0f4f8; }
        .nav-tab { margin-bottom: 20px; }
        .nav-tab button { padding: 10px 20px; cursor: pointer; border: none; border-radius: 8px; font-weight: bold; background: #cbd5e1; color: #475569; }
        .nav-tab .active { background: #ec4899; color: white; }
        .box { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 450px; margin: auto; }
        .timer-display { font-size: 70px; font-weight: bold; color: #ec4899; margin: 20px 0; }
        input { padding: 12px; width: 60px; font-size: 16px; border: 2px solid #ddd; border-radius: 10px; }
        button { padding: 12px 18px; cursor: pointer; border: none; border-radius: 10px; font-weight: bold; color: white; background: #ec4899; margin: 3px; }
        .add-btn { background: #64748b; font-size: 14px; }
        .alert-msg { color: #e11d48; font-size: 22px; font-weight: bold; display: none; margin-top: 20px; }
    </style>
</head>
<body onclick="audio.play(); audio.pause();">

    <div class="nav-tab">
        <button class="active">⏰ 초집중 타이머</button>
        <button onclick="location.href='alarm_secretary1.html'">📋 긴 알림 대시보드</button>
    </div>

    <div class="box">
        <h1>⏰ 초집중 타이머</h1>
        <div id="display" class="timer-display">00:00</div>
        
        <input type="number" id="m" placeholder="분">
        <input type="number" id="s" placeholder="초">
        <button onclick="set()">설정</button>
        
        <div style="margin-top:15px;">
            <button class="add-btn" onclick="addTime(1)">+1초</button>
            <button class="add-btn" onclick="addTime(5)">+5초</button>
            <button class="add-btn" onclick="addTime(10)">+10초</button>
            <button class="add-btn" onclick="addTime(30)">+30초</button>
            <button class="add-btn" onclick="addTime(60)">+1분</button>
        </div>
        
        <div style="margin-top:20px;">
            <button id="start" onclick="go()">🚀 타이머 시작</button>
            <button id="stop" onclick="stopAlarm()" style="display:none; background:#334155;">🛑 알람 끄기</button>
        </div>
        
        <div id="msg" class="alert-msg">🔔 시간 종료!</div>
    </div>

    <script>
        let time = 0, id;
        const audio = new Audio("https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg");
        audio.loop = true;

        // 페이지 로드 시 기존 타이머 정보 확인
        window.onload = () => {
            const endTime = localStorage.getItem('timerEndTime');
            if (endTime) {
                const remaining = Math.max(0, Math.floor((parseInt(endTime) - Date.now()) / 1000));
                if (remaining > 0) {
                    time = remaining;
                    go(); // 타이머 자동 재개
                }
            }
        };

        function set() {
            time = (parseInt(document.getElementById('m').value)||0)*60 + (parseInt(document.getElementById('s').value)||0);
            show();
        }

        function addTime(sec) {
            time += sec;
            show();
        }

        function show() {
            const m = Math.floor(time/60);
            const s = time%60;
            document.getElementById('display').innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        }

        function go() {
            if (time <= 0) return alert("시간을 설정해주세요!");
            document.getElementById('start').style.display = 'none';
            document.getElementById('stop').style.display = 'inline-block';
            
            // 타이머 종료 시간 저장 (현재 시간 + 남은 시간)
            localStorage.setItem('timerEndTime', Date.now() + time * 1000);

            id = setInterval(() => {
                time--;
                show();
                if (time <= 0) {
                    clearInterval(id);
                    localStorage.removeItem('timerEndTime');
                    audio.play();
                    document.getElementById('msg').style.display = 'block';
                }
            }, 1000);
        }

        function stopAlarm() {
            clearInterval(id);
            localStorage.removeItem('timerEndTime');
            audio.pause(); 
            audio.currentTime = 0;
            document.getElementById('msg').style.display = 'none';
            document.getElementById('stop').style.display = 'none';
            document.getElementById('start').style.display = 'inline-block';
            time = 0; show();
        }
    </script>
</body>
</html>
