<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>알림 비서 대시보드</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; text-align: center; padding: 40px; background: #f0f4f8; }
        .nav-tab { margin-bottom: 20px; }
        .nav-tab button { padding: 10px 20px; cursor: pointer; border: none; border-radius: 8px; font-weight: bold; background: #cbd5e1; color: #475569; }
        .nav-tab .active { background: #ec4899; color: white; }
        .box { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        textarea { width: 100%; height: 80px; padding: 12px; margin: 10px 0; border: 2px solid #ddd; border-radius: 10px; box-sizing: border-box; resize: none; font-size: 16px; }
        input[type="time"] { width: 100%; padding: 12px; margin-bottom: 15px; border: 2px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        button { padding: 12px 18px; cursor: pointer; border: none; border-radius: 10px; font-weight: bold; color: white; background: #ec4899; margin: 3px; }
        .time-btn { background: #64748b; font-size: 13px; }
        .alarm-item { display: flex; justify-content: space-between; padding: 15px; border-bottom: 1px solid #eee; align-items: center; text-align: left; }
        #alertBox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(236, 72, 153, 0.95); color: white; padding-top: 20%; font-size: 24px; font-weight: bold; z-index: 1000; }
    </style>
</head>
<body>

    <div class="nav-tab">
        <button onclick="location.href='alarm_secretary.html'">⏰ 초집중 타이머</button>
        <button class="active">📋 긴 알림 대시보드</button>
    </div>

    <div class="box">
        <h1>📋 긴 시간용 대시보드</h1>
        <textarea id="name" placeholder="알림 내용을 적어주세요..."></textarea>
        <input type="time" id="time">
        
        <div>
            <button class="time-btn" onclick="addPreset(10)">+10분</button>
            <button class="time-btn" onclick="addPreset(30)">+30분</button>
            <button class="time-btn" onclick="addPreset(60)">+1시간</button>
            <button class="time-btn" onclick="addPreset(180)">+3시간</button>
            <button class="time-btn" onclick="addPreset(300)">+5시간</button>
        </div>
        
        <button onclick="addAlarm()" style="width:100%; font-size:18px; margin-top:15px;">+ 예약 알림 등록</button>
        <div id="alarmList" style="margin-top:20px;"></div>
    </div>

    <div id="alertBox">
        <div id="alertText" style="padding:0 20px;"></div><br><br>
        <button onclick="stopAlarm()" style="background:#fff; color:#ec4899; font-size:22px; padding:20px 50px;">🛑 알람 끄기</button>
    </div>

    <script>
        const audio = new Audio("https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg");
        audio.loop = true;
        let isAlarmActive = false;

        document.body.addEventListener('click', () => { audio.play().then(() => audio.pause()).catch(() => {}); }, { once: true });

        // 페이지 로드 시 저장된 알람 불러오기
        window.onload = () => {
            const savedAlarms = JSON.parse(localStorage.getItem('myAlarms') || '[]');
            savedAlarms.forEach(alarm => createAlarmElement(alarm.name, alarm.time));
        };

        function addPreset(minutes) {
            const now = new Date();
            now.setMinutes(now.getMinutes() + minutes);
            document.getElementById('time').value = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
        }

        function addAlarm() {
            const name = document.getElementById('name').value;
            const time = document.getElementById('time').value;
            if (!name || !time) return alert("내용과 시간을 입력하세요!");
            
            createAlarmElement(name, time);
            saveAlarms();
            document.getElementById('name').value = '';
        }

        function createAlarmElement(name, time) {
            const div = document.createElement('div');
            div.className = 'alarm-item';
            div.dataset.time = time;
            div.dataset.name = name;
            div.innerHTML = `<div>🔔 <b>${name}</b><br><small>${time}</small></div> <button onclick="removeAlarm(this)" style="background:red;">삭제</button>`;
            document.getElementById('alarmList').appendChild(div);
        }

        function removeAlarm(btn) {
            btn.parentElement.remove();
            saveAlarms();
        }

        function saveAlarms() {
            const alarms = [];
            document.querySelectorAll('.alarm-item').forEach(item => {
                alarms.push({ name: item.dataset.name, time: item.dataset.time });
            });
            localStorage.setItem('myAlarms', JSON.stringify(alarms));
        }

        function stopAlarm() {
            audio.pause();
            audio.currentTime = 0;
            isAlarmActive = false;
            document.getElementById('alertBox').style.display = 'none';
        }

        setInterval(() => {
            if (isAlarmActive) return;
            const nowTime = `${String(new Date().getHours()).padStart(2,'0')}:${String(new Date().getMinutes()).padStart(2,'0')}`;
            document.querySelectorAll('.alarm-item').forEach(item => {
                if (item.dataset.time === nowTime && !item.classList.contains('fired')) {
                    item.classList.add('fired');
                    isAlarmActive = true;
                    audio.play();
                    document.getElementById('alertText').innerText = '🔔 ' + item.dataset.name;
                    document.getElementById('alertBox').style.display = 'block';
                }
            });
        }, 1000);
    </script>
</body>
</html>
