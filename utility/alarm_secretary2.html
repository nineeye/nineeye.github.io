<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>만능 알림 비서</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; background: #f0f4f8; text-align: center; padding: 20px; }
        .page { display: none; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 400px; margin: 20px auto; }
        .page.active { display: block; }
        button { padding: 12px 20px; cursor: pointer; border: none; border-radius: 10px; background: #ec4899; color: white; font-weight: bold; margin: 5px; }
        input { padding: 10px; border: 1px solid #ddd; border-radius: 5px; width: 60px; }
        .nav-btn { background: #94a3b8; }
        .nav-btn.active { background: #ec4899; }
    </style>
</head>
<body>

    <div style="margin-bottom:20px;">
        <button class="nav-btn active" onclick="showPage('timer', this)">⏰짧은 타이머</button>
        <button class="nav-btn" onclick="showPage('dash', this)">📋 알림 대시보드</button>
    </div>

    <div id="timer" class="page active">
        <h2>⏰ 짧은 시간용 타이머</h2>
        <div id="timeDisplay" style="font-size:40px; margin:20px;">00:00</div>
        <input type="number" id="minInput" placeholder="분">
        <input type="number" id="secInput" placeholder="초">
        <button onclick="setTimer()">설정</button>
        <br>
        <button id="startBtn" onclick="startTimer()">🚀 타이머 시작</button>
        <button id="stopBtn" onclick="stopAlarm()" style="display:none; background:#334155;">🛑 알람 끄기</button>
    </div>

    <div id="dash" class="page">
        <h2>📋 알림 비서 대시보드</h2>
        <input type="text" id="alarmName" placeholder="내용" style="width:70%;"><br><br>
        <input type="time" id="alarmTime" style="width:70%;"><br><br>
        <button onclick="addAlarm()">+ 알림 등록</button>
        <div id="alarmList" style="margin-top:20px;"></div>
    </div>

    <script>
        let timeLeft = 0, timerId = null;
        const audio = new Audio("https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg");
        audio.loop = true;

        function showPage(pageId, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            btn.classList.add('active');
        }

        function setTimer() {
            timeLeft = (parseInt(document.getElementById('minInput').value) || 0) * 60 + (parseInt(document.getElementById('secInput').value) || 0);
            updateDisplay();
        }

        function updateDisplay() {
            const m = Math.floor(timeLeft / 60);
            const s = timeLeft % 60;
            document.getElementById('timeDisplay').innerText = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        }

        function startTimer() {
            if (timeLeft <= 0) return alert("시간을 설정하세요!");
            document.getElementById('startBtn').style.display = "none";
            document.getElementById('stopBtn').style.display = "inline-block";
            timerId = setInterval(() => {
                timeLeft--;
                updateDisplay();
                if (timeLeft <= 0) { clearInterval(timerId); audio.play(); alert("시간 종료!"); }
            }, 1000);
        }

        function stopAlarm() {
            audio.pause(); audio.currentTime = 0;
            clearInterval(timerId);
            document.getElementById('startBtn').style.display = "inline-block";
            document.getElementById('stopBtn').style.display = "none";
        }

        function addAlarm() {
            const name = document.getElementById('alarmName').value;
            const time = document.getElementById('alarmTime').value;
            if(!name || !time) return alert("내용과 시간을 입력하세요!");
            const div = document.createElement('div');
            div.className = "alarm-item";
            div.dataset.time = time;
            div.innerHTML = `<p>${name} - ${time} <button onclick="this.parentElement.remove()" style="background:red;">삭제</button></p>`;
            document.getElementById('alarmList').appendChild(div);
        }

        setInterval(() => {
            const nowTime = new Date().toTimeString().slice(0,5);
            document.querySelectorAll('.alarm-item').forEach(item => {
                if (item.dataset.time === nowTime && !item.classList.contains('fired')) {
                    item.classList.add('fired');
                    audio.play();
                    alert("🔔 알림: " + item.innerText);
                }
            });
        }, 1000);
    </script>
</body>
</html>
