<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>강력한 무작위 비밀번호 생성기 | 보안 패스워드 조합기</title>
    <style>
        body { font-family: 'Pretendard', -apple-system, sans-serif; background-color: #f0f4f8; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; }
        .nav { display: flex; gap: 8px; margin-bottom: 25px; justify-content: center; width: 100%; max-width: 600px; }
        .nav a { flex: 1; text-align: center; padding: 12px 4px; background: #e2e8f0; color: #475569; text-decoration: none; border-radius: 12px; font-size: 14px; font-weight: 700; transition: all 0.2s; }
        .nav a.active { background: #10b981; color: white; }
        
        .container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 600px; box-sizing: border-box; }
        h2 { color: #0f172a; font-size: 22px; margin: 0 0 10px 0; font-weight: 800; text-align: center; }
        .sub-desc { color: #64748b; font-size: 14px; text-align: center; margin-bottom: 25px; }
        
        .result-box { background: #f8fafc; border: 2px dashed #10b981; border-radius: 12px; padding: 22px; text-align: center; margin-bottom: 20px; }
        #passwordDisplay { font-size: 22px; font-weight: 800; color: #0f172a; }
        .strength-meter { height: 6px; background: #e2e8f0; border-radius: 3px; margin-bottom: 25px; overflow: hidden; }
        .strength-bar { height: 100%; width: 0%; transition: all 0.3s ease; }
        .strength-text { font-size: 12px; font-weight: 700; text-align: right; margin-bottom: 5px; color: #64748b; }
        
        .options { margin-bottom: 25px; }
        .option-group { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
        input[type="range"] { width: 100%; accent-color: #10b981; margin-top: 10px; }
        input[type="checkbox"] { width: 19px; height: 19px; accent-color: #10b981; cursor: pointer; }
        
        .buttons { display: flex; gap: 10px; }
        button { flex: 1; padding: 14px; border: none; border-radius: 10px; cursor: pointer; font-size: 15px; font-weight: 700; }
        .btn-generate { background: #0f172a; color: white; }
        .btn-copy { background: #10b981; color: white; }
    </style>
</head>
<body>

    <div class="nav">
        <a href="/korea-convenient-service/index.html">🏠 홈</a>
        <a href="/korea-convenient-service/webtools/utility/randompassword.html" class="active">비밀번호 생성기</a>
        <a href="/korea-convenient-service/webtools/utility/remember_notepad.html">임시 메모장</a>
    </div>

    <div class="container">
        <h2>🔒 강력한 비밀번호 생성기</h2>
        <p class="sub-desc">예측 불가능한 강력한 비밀번호를 생성하세요.</p>
        
        <div class="result-box">
            <div id="passwordDisplay">여기에 생성됩니다</div>
        </div>
        
        <div class="strength-text" id="strengthText">보안 등급: 대기 중</div>
        <div class="strength-meter"><div class="strength-bar" id="strengthBar"></div></div>

        <div class="options">
            <label>비밀번호 길이 <span id="lengthVal">14</span></label>
            <input type="range" id="lengthSlider" min="6" max="45" value="14">
            <div class="option-group"><label>대문자 포함</label><input type="checkbox" id="incUpper" checked></div>
            <div class="option-group"><label>소문자 포함</label><input type="checkbox" id="incLower" checked></div>
            <div class="option-group"><label>숫자 포함</label><input type="checkbox" id="incNumbers" checked></div>
            <div class="option-group"><label>특수문자 포함</label><input type="checkbox" id="incSymbols" checked></div>
        </div>

        <div class="buttons">
            <button class="btn-generate" onclick="generatePassword()">🔄 새로 생성</button>
            <button class="btn-copy" onclick="copyPassword()">📋 복사하기</button>
        </div>
    </div>

    <script>
        const lengthSlider = document.getElementById('lengthSlider'), lengthVal = document.getElementById('lengthVal'), passwordDisplay = document.getElementById('passwordDisplay'), strengthBar = document.getElementById('strengthBar'), strengthText = document.getElementById('strengthText');
        function generatePassword() {
            const len = lengthSlider.value;
            lengthVal.innerText = len;
            let chars = "";
            if(document.getElementById('incUpper').checked) chars += "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            if(document.getElementById('incLower').checked) chars += "abcdefghijklmnopqrstuvwxyz";
            if(document.getElementById('incNumbers').checked) chars += "0123456789";
            if(document.getElementById('incSymbols').checked) chars += "!@#$%^&*()_+";
            let pwd = "";
            for(let i=0; i<len; i++) pwd += chars.charAt(Math.floor(Math.random() * chars.length));
            passwordDisplay.innerText = pwd;
            strengthBar.style.width = (len * 2) + "%";
            strengthBar.style.backgroundColor = len > 12 ? "#10b981" : "#f59e0b";
        }
        lengthSlider.addEventListener('input', generatePassword);
        generatePassword();
        function copyPassword() { navigator.clipboard.writeText(passwordDisplay.innerText); alert('복사되었습니다!'); }
    </script>
</body>
</html>
