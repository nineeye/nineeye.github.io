<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>강력한 무작위 비밀번호 생성기 | 보안 패스워드 조합기</title>
    <meta name="description" content="안전하고 강력한 무작위 비밀번호를 실시간으로 생성합니다. 보안 등급 진단 기능을 제공합니다.">
    <meta name="keywords" content="비밀번호생성기, 패스워드생성기, 무작위비밀번호, 보안비밀번호">
    <style>
        body { 
            font-family: 'Pretendard', -apple-system, sans-serif; 
            background-color: #f0f4f8; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh;
            margin: 0;
            justify-content: center;
        }
        .nav { display: flex; gap: 4px; margin-bottom: 20px; justify-content: center; width: 100%; max-width: 700px; }
        .nav a { flex: 1; text-align: center; padding: 10px 4px; background: #e2e8f0; color: #475569; text-decoration: none; border-radius: 8px; font-size: 13px; font-weight: 700; transition: all 0.2s; white-space: nowrap; }
        .nav a:hover { background: #cbd5e1; }
        .nav a.active { background: #0284c7; color: white; }
        
        .container { 
            background: white; padding: 30px; border-radius: 20px; box-shadow: 0 12px 30px rgba(0,0,0,0.08); 
            width: 100%; max-width: 700px; box-sizing: border-box;
        }
        h2 { color: #0f172a; font-size: 22px; margin: 0 0 6px 0; font-weight: 800; text-align: center; }
        .sub-desc { color: #64748b; font-size: 13px; text-align: center; margin: 0 0 20px 0; }
        .result-box { background: #f8fafc; border: 2px dashed #0284c7; border-radius: 12px; padding: 22px; text-align: center; margin-bottom: 15px; word-break: break-all; }
        #passwordDisplay { font-size: 22px; font-weight: 800; color: #0f172a; letter-spacing: 1px; }
        .strength-meter { height: 6px; background: #e2e8f0; border-radius: 3px; margin-bottom: 25px; overflow: hidden; position: relative; }
        .strength-bar { height: 100%; width: 0%; transition: all 0.3s ease; }
        .strength-text { font-size: 12px; font-weight: 700; text-align: right; margin-top: -20px; margin-bottom: 15px; color: #64748b; }
        .options { margin-bottom: 25px; }
        .option-group { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
        .option-group label { font-size: 15px; color: #334155; font-weight: 600; cursor: pointer; }
        input[type="range"] { width: 100%; margin-top: 10px; cursor: pointer; accent-color: #0284c7; }
        .length-val { font-weight: 800; color: #0284c7; font-size: 18px; }
        input[type="checkbox"] { width: 19px; height: 19px; cursor: pointer; accent-color: #0284c7; }
        .buttons { display: flex; gap: 10px; }
        button { flex: 1; padding: 14px; border: none; border-radius: 10px; cursor: pointer; font-size: 15px; font-weight: 700; transition: all 0.2s ease; }
        button:active { transform: scale(0.98); }
        .btn-generate { background: #0f172a; color: white; } .btn-generate:hover { background: #1e293b; }
        .btn-copy { background: #0284c7; color: white; } .btn-copy:hover { background: #0369a1; }
        
        @media (max-width: 600px) { .nav { gap: 2px; } .nav a { font-size: 11px; padding: 8px 2px; } }
    </style>
</head>
<body>

    <div class="nav">
        <a href="index.html" style="background: #0f172a; color: white;">🏠 홈</a>
        <a href="bigsmalltextchange1.html">📝 글자수</a>
        <a href="bigsmalltextchange2.html">🔠 대소문자</a>
        <a href="bigsmalltextchange3.html">✨ 맞춤법</a>
        <a href="bigsmalltextchange4.html">🚫 공백제거</a>
        <a href="bigsmalltextchange5.html" class="active">🔒 비밀번호</a>
        <a href="bigsmalltextchange6.html">📄 메모장</a>
    </div>

    <div class="container">
        <h2>🔒 강력한 무작위 비밀번호 생성기</h2>
        <p class="sub-desc">예측 불가능한 무작위 암호를 생성하여 소중한 계정을 철저하게 보호하세요.</p>
        
        <div class="result-box">
            <div id="passwordDisplay">여기에 생성됩니다</div>
        </div>
        
        <div class="strength-text" id="strengthText">보안 등급: 대기 중</div>
        <div class="strength-meter">
            <div class="strength-bar" id="strengthBar"></div>
        </div>

        <div class="options">
            <div class="option-group" style="display: block; margin-bottom: 20px;">
                <div style="display: flex; justify-content: space-between;">
                    <label>비밀번호 길이</label>
                    <span class="length-val" id="lengthVal">14</span>
                </div>
                <input type="range" id="lengthSlider" min="6" max="45" value="14">
            </div>
            <div class="option-group">
                <label for="incUpper">대문자 포함 (A-Z)</label>
                <input type="checkbox" id="incUpper" checked>
            </div>
            <div class="option-group">
                <label for="incLower">소문자 포함 (a-z)</label>
                <input type="checkbox" id="incLower" checked>
            </div>
            <div class="option-group">
                <label for="incNumbers">숫자 포함 (0-9)</label>
                <input type="checkbox" id="incNumbers" checked>
            </div>
            <div class="option-group">
                <label for="incSymbols">특수문자 포함 (!@#$%^&*)</label>
                <input type="checkbox" id="incSymbols" checked>
            </div>
            <div class="option-group" style="border-top: 1px dashed #e2e8f0; padding-top: 12px; margin-top: 12px;">
                <label for="excSimilar" style="color: #64748b; font-size: 14px;">헷갈리는 문자 제외 <span style="font-weight:normal; font-size:12px;">(i, l, 1, o, 0, O 등)</span></label>
                <input type="checkbox" id="excSimilar" checked>
            </div>
        </div>

        <div class="buttons">
            <button class="btn-generate" onclick="generatePassword()">🔄 새로 생성</button>
            <button class="btn-copy" onclick="copyPassword()">📋 복사하기</button>
        </div>
    </div>

    <script>
        const passwordDisplay = document.getElementById('passwordDisplay');
        const lengthSlider = document.getElementById('lengthSlider');
        const lengthVal = document.getElementById('lengthVal');
        const incUpper = document.getElementById('incUpper');
        const incLower = document.getElementById('incLower');
        const incNumbers = document.getElementById('incNumbers');
        const incSymbols = document.getElementById('incSymbols');
        const excSimilar = document.getElementById('excSimilar');
        const strengthBar = document.getElementById('strengthBar');
        const strengthText = document.getElementById('strengthText');

        const upperLetters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        const lowerLetters = 'abcdefghijklmnopqrstuvwxyz';
        const numbers = '0123456789';
        const symbols = '!@#$%^&*()_+~`|}{[]:;?><,./-=';
        const similarChars = /[il1oL0O]/g;

        lengthSlider.addEventListener('input', function() { lengthVal.innerText = lengthSlider.value; generatePassword(); });
        incUpper.addEventListener('change', generatePassword); incLower.addEventListener('change', generatePassword);
        incNumbers.addEventListener('change', generatePassword); incSymbols.addEventListener('change', generatePassword);
        excSimilar.addEventListener('change', generatePassword);

        function checkStrength(password, length, optionsCount) {
            let score = 0;
            if (length >= 8) score++; if (length >= 14) score++; if (optionsCount >= 3) score++; if (optionsCount === 4) score++;
            if (length >= 10 && /[!@#$%^&*()_+~`|}{[\]:;?><,./-=]/.test(password)) score++;
            if (password === '옵션을 선택하세요!') return { text: '대기 중', color: '#e2e8f0', width: '0%' };
            if (score <= 1) return { text: '보안 등급: ⚠️ 취약 (위험)', color: '#ef4444', width: '25%' };
            else if (score === 2 || score === 3) return { text: '보안 등급: 🟡 보통 (권장)', color: '#f59e0b', width: '50%' };
            else if (score === 4) return { text: '보안 등급: 🟢 안전 (우수)', color: '#10b981', width: '75%' };
            else return { text: '보안 등급: 👑 강력 (완벽)', color: '#3b82f6', width: '100%' };
        }

        function generatePassword() {
            let charPool = '', upperPool = upperLetters, lowerPool = lowerLetters, numberPool = numbers, symbolPool = symbols;
            let optionsCount = 0; const length = parseInt(lengthSlider.value);
            if (excSimilar.checked) { upperPool = upperPool.replace(similarChars, ''); lowerPool = lowerPool.replace(similarChars, ''); numberPool = numberPool.replace(similarChars, ''); symbolPool = symbolPool.replace(similarChars, ''); }
            if (incUpper.checked) { charPool += upperPool; optionsCount++; } if (incLower.checked) { charPool += lowerPool; optionsCount++; }
            if (incNumbers.checked) { charPool += numberPool; optionsCount++; } if (incSymbols.checked) { charPool += symbolPool; optionsCount++; }
            if (charPool === '') { passwordDisplay.innerText = '옵션을 선택하세요!'; passwordDisplay.style.color = '#ef4444'; updateMeter('옵션을 선택하세요!', length, 0); return; }
            passwordDisplay.style.color = '#0f172a';
            let generatedPassword = ''; for (let i = 0; i < length; i++) { const randomIndex = Math.floor(Math.random() * charPool.length); generatedPassword += charPool[randomIndex]; }
            passwordDisplay.innerText = generatedPassword; updateMeter(generatedPassword, length, optionsCount);
        }

        function updateMeter(pwd, len, optCount) { const strength = checkStrength(pwd, len, optCount); strengthText.innerText = strength.text; strengthBar.style.backgroundColor = strength.color; strengthBar.style.width = strength.width; }
        function copyPassword() { const text = passwordDisplay.innerText; if (text === '옵션을 선택하세요!') { alert('유효한 비밀번호를 먼저 생성해 주세요.'); return; } navigator.clipboard.writeText(text).then(() => { alert('📋 비밀번호가 클립보드에 복사되었습니다!'); })}
        generatePassword();
    </script>
</body>
</html>
